<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | TEOPICTURE</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
<h1 class="logo">TEOPICTURE</h1>
<nav>
<a href="index.html">Accueil</a>
<a href="portfolio.html">Portfolio</a>
<a href="services.html">Services</a>
<a href="reservation.html">Réservation</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<main class="container">
<h2>Contactez-nous</h2>

<div class="contact-grid">

<div class="contact-info">
<h3>Informations</h3>
<p><strong>Téléphone :</strong> <a href="tel:+221775781956">77 578 19 56</a></p>
<p><strong>WhatsApp :</strong> <a href="https://wa.me/221775781956" target="_blank">77 578 19 56</a></p>
<p><strong>Ville :</strong> Dakar / Thies</p>
<a href="reservation.html" class="btn">Réserver une séance</a>
</div>

<form class="contact-form">
<div class="form-group">
<label>Nom</label>
<input type="text" id="nom" required>
</div>

<div class="form-group">
<label>Téléphone</label>
<input type="tel" id="telephone">
</div>

<div class="form-group">
<label>Message</label>
<textarea id="message" rows="5" required></textarea>
</div>

<button type="button" onclick="envoyerContact()" class="btn">Envoyer</button>
</form>

</div>
</main>

<footer>
<p>© 2026 TEOPICTURE - Tous droits réservés</p>
</footer>

<script>
function envoyerContact() {
  let nom = document.getElementById("nom").value;
  let telephone = document.getElementById("telephone").value;
  let message = document.getElementById("message").value;

  let texte =
    "Bonjour, je vous contacte depuis TEOPICTURE.%0A%0A" +
    "Nom : " + nom + "%0A" +
    "Téléphone : " + telephone + "%0A" +
    "Message : " + message;

  let numero = "221775781956";

  window.open("https://wa.me/" + numero + "?text=" + texte);
}
</script>

<script>
// Sélectionne tous les éléments à animer
const elements = document.querySelectorAll(".container, .card, .photo");

function checkScroll() {
  const screenHeight = window.innerHeight;

  elements.forEach(el => {
    const position = el.getBoundingClientRect().top;

    if(position < screenHeight - 100){
      el.classList.add("visible");
    }
  });
}

// Vérifie le scroll au chargement et à chaque mouvement de scroll
window.addEventListener("scroll", checkScroll);
window.addEventListener("load", checkScroll);
</script>

</body>
</html>
